server:
  port: 8080

spring:
  application:
    name: Context-Aware-Personal-Assistant

  # 1. Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/assistant_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: XXXXXX
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # 2. Google OAuth2 Client Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "XXXXX-XXXXXXXXXXXX.apps.googleusercontent.com"
            client-secret: "XXXXXXXXXXXXXXXXXXXXXXX"
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/calendar
              - https://www.googleapis.com/auth/gmail.readonly
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  # 3. AI NLP Engine Configuration (Ollama)
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000
